services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gravity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gravity}
      POSTGRES_DB: ${POSTGRES_DB:-gravity}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gravity} -d ${POSTGRES_DB:-gravity}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gravity}:${POSTGRES_PASSWORD:-gravity}@postgres:5432/${POSTGRES_DB:-gravity}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      ALLOW_PUBLIC_REGISTRATION: ${ALLOW_PUBLIC_REGISTRATION:-false}
      NEXT_PUBLIC_ALLOW_PUBLIC_REGISTRATION: ${ALLOW_PUBLIC_REGISTRATION:-false}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-}
      RUN_SEED: ${RUN_SEED:-true}
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  postgres-data:
